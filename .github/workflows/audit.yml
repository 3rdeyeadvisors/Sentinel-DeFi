name: Audit

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run Audit
        run: npm audit
      - name: Run Lint
        run: npm run lint
      - name: Run Build
        run: npm run build
